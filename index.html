<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Language Translator - Translate text between multiple languages instantly">
  <title>AI Language Translator</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="logo-icon">
          <i class="fas fa-language"></i>
        </div>
        <div>
          <h1 class="title">AI Language Translator</h1>
          <p class="subtitle">Powered by intelligent translation</p>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>
    </header>

    <!-- Main Translator Card -->
    <main class="translator-card glass">
      <!-- Language Controls -->
      <div class="language-bar">
        <div class="lang-select-group">
          <label for="sourceLang">
            <i class="fas fa-arrow-right-from-bracket"></i> Source
          </label>
          <select id="sourceLang" class="lang-select">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="ja">Japanese</option>
            <option value="zh">Chinese</option>
          </select>
        </div>

        <button class="swap-btn" id="swapBtn" aria-label="Swap languages" title="Swap languages">
          <i class="fas fa-right-left"></i>
        </button>

        <div class="lang-select-group">
          <label for="targetLang">
            <i class="fas fa-arrow-right-to-bracket"></i> Target
          </label>
          <select id="targetLang" class="lang-select">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="ja">Japanese</option>
            <option value="zh">Chinese</option>
          </select>
        </div>
      </div>

      <!-- Text Areas -->
      <div class="text-panels">
        <!-- Input Panel -->
        <div class="text-panel">
          <div class="panel-header">
            <span class="panel-label"><i class="fas fa-keyboard"></i> Input Text</span>
            <div class="panel-actions">
              <button class="icon-btn" id="micBtn" aria-label="Voice input" title="Voice input">
                <i class="fas fa-microphone"></i>
              </button>
              <button class="icon-btn" id="clearBtn" aria-label="Clear input" title="Clear">
                <i class="fas fa-eraser"></i>
              </button>
            </div>
          </div>
          <textarea
            id="inputText"
            class="text-area"
            placeholder="Type or speak here... e.g. Hello, how are you?"
            rows="6"
            maxlength="5000"
          ></textarea>
          <div class="panel-footer">
            <span class="char-counter"><span id="charCount">0</span> / 5000</span>
          </div>
        </div>

        <!-- Output Panel -->
        <div class="text-panel">
          <div class="panel-header">
            <span class="panel-label"><i class="fas fa-wand-magic-sparkles"></i> Translation</span>
            <div class="panel-actions">
              <button class="icon-btn" id="speakBtn" aria-label="Text to speech" title="Listen">
                <i class="fas fa-volume-high"></i>
              </button>
              <button class="icon-btn" id="copyBtn" aria-label="Copy translation" title="Copy output">
                <i class="fas fa-copy"></i>
              </button>
            </div>
          </div>
          <div class="output-wrapper">
            <textarea
              id="outputText"
              class="text-area output-area"
              placeholder="Translation will appear here..."
              rows="6"
              readonly
            ></textarea>
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
              <div class="loader">
                <div class="loader-ring"></div>
                <span>Translating...</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Translate Button -->
      <div class="action-bar">
        <button class="translate-btn" id="translateBtn">
          <i class="fas fa-language"></i>
          <span>Translate</span>
        </button>
      </div>
    </main>

    <!-- Recent History -->
    <section class="history-section glass" id="historySection">
      <div class="history-header">
        <h2><i class="fas fa-clock-rotate-left"></i> Recent Translations</h2>
        <button class="text-btn" id="clearHistoryBtn">Clear History</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-empty">No translations yet. Try translating something!</li>
      </ul>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>Demo dictionary + MyMemory API &bull; No backend required</p>
    </footer>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast" role="alert" aria-live="polite">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">Copied to clipboard!</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
